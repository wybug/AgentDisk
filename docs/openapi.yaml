openapi: 3.0.3
info:
  title: AgentDisk API
  description: OpenAI-style API for multi-agent cloud disk middleware
  version: 1.0.0
  contact:
    name: AgentDisk
  license:
    name: Apache 2.0

servers:
  - url: http://localhost:9100
    description: Local development

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [System]
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: "ok"

  /v1/disk/space:
    get:
      summary: Get user disk space info
      operationId: getSpace
      tags: [Space]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserDisk"

  /v1/disk/folders:
    post:
      summary: Create folder
      operationId: createFolder
      tags: [Folder]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folderName]
              properties:
                parentId:
                  type: integer
                  format: uint64
                  default: 0
                folderName:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiskFolder"
    get:
      summary: List folders
      operationId: listFolders
      tags: [Folder]
      parameters:
        - name: parentId
          in: query
          schema:
            type: integer
            format: uint64
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DiskFolder"

  /v1/disk/folders/{id}:
    get:
      summary: Get folder details
      operationId: getFolder
      tags: [Folder]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiskFolder"
    put:
      summary: Rename folder
      operationId: renameFolder
      tags: [Folder]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folderName]
              properties:
                folderName:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiskFolder"
    delete:
      summary: Delete folder
      operationId: deleteFolder
      tags: [Folder]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"

  /v1/disk/folders/{id}/ancestors:
    get:
      summary: Get folder path hierarchy
      operationId: getAncestors
      tags: [Folder]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DiskFolder"

  /v1/disk/files/upload:
    post:
      summary: Upload file
      operationId: uploadFile
      tags: [File]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, folderId]
              properties:
                file:
                  type: string
                  format: binary
                folderId:
                  type: integer
                  format: uint64
                agentId:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiskFile"

  /v1/disk/files:
    get:
      summary: List files in folder
      operationId: listFiles
      tags: [File]
      parameters:
        - name: folderId
          in: query
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DiskFile"

  /v1/disk/files/{id}:
    get:
      summary: Get file info with presigned URL
      operationId: getFile
      tags: [File]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FileDetailResponse"
    put:
      summary: Update file (creates version snapshot)
      operationId: updateFile
      tags: [File]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiskFile"
    delete:
      summary: Delete file (move to recycle bin)
      operationId: deleteFile
      tags: [File]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"

  /v1/disk/files/{id}/download-token:
    post:
      summary: Generate download token for file
      operationId: createDownloadToken
      tags: [File]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DownloadTokenResponse"

  /v1/disk/files/download:
    get:
      summary: Download file by token (public, no auth)
      operationId: downloadByToken
      tags: [File]
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DownloadByTokenResponse"

  /v1/disk/permissions:
    post:
      summary: Grant permission to agent
      operationId: grantPermission
      tags: [Permission]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId, resourceId, resType, permission]
              properties:
                agentId:
                  type: string
                resourceId:
                  type: integer
                  format: uint64
                resType:
                  type: string
                  enum: [file, folder]
                permission:
                  type: string
                  enum: [owner, read, write, delete]
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"
    get:
      summary: List permissions
      operationId: listPermissions
      tags: [Permission]
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: resourceId
          in: query
          schema:
            type: integer
            format: uint64
        - name: resType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DiskPermission"
    delete:
      summary: Revoke permission
      operationId: revokePermission
      tags: [Permission]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId, resourceId, resType]
              properties:
                agentId:
                  type: string
                resourceId:
                  type: integer
                  format: uint64
                resType:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"

  /v1/disk/permissions/check:
    get:
      summary: Check specific permission
      operationId: checkPermission
      tags: [Permission]
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: resourceId
          in: query
          required: true
          schema:
            type: integer
            format: uint64
        - name: resType
          in: query
          required: true
          schema:
            type: string
        - name: permission
          in: query
          required: true
          schema:
            type: string
            enum: [owner, read, write, delete]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PermissionCheckResponse"

  /v1/disk/versions:
    get:
      summary: List file versions
      operationId: listVersions
      tags: [Version]
      parameters:
        - name: fileId
          in: query
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DiskFileVersion"

  /v1/disk/versions/rollback:
    post:
      summary: Rollback to specific version
      operationId: rollbackVersion
      tags: [Version]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileId, version]
              properties:
                fileId:
                  type: integer
                  format: uint64
                version:
                  type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"

  /v1/disk/recycle:
    get:
      summary: List recycle bin items
      operationId: listRecycle
      tags: [Recycle]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DiskRecycleBin"
    delete:
      summary: Permanently delete item
      operationId: deletePermanent
      tags: [Recycle]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recycleId]
              properties:
                recycleId:
                  type: integer
                  format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"

  /v1/disk/recycle/restore:
    post:
      summary: Restore item from recycle bin
      operationId: restoreItem
      tags: [Recycle]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recycleId]
              properties:
                recycleId:
                  type: integer
                  format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"

  /v1/disk/tags/bind:
    post:
      summary: Bind tag to file
      operationId: bindTag
      tags: [Tag]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileId, tagName]
              properties:
                fileId:
                  type: integer
                  format: uint64
                tagName:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"

  /v1/disk/tags/unbind:
    post:
      summary: Unbind tag from file
      operationId: unbindTag
      tags: [Tag]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileId, tagName]
              properties:
                fileId:
                  type: integer
                  format: uint64
                tagName:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"

  /v1/disk/tags/search:
    get:
      summary: Search files by tags
      operationId: searchByTags
      tags: [Tag]
      parameters:
        - name: tags
          in: query
          required: true
          description: Comma-separated tag names
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DiskFile"

  /v1/disk/shares:
    post:
      summary: Create share link
      operationId: createShare
      tags: [Share]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resourceId, resType]
              properties:
                resourceId:
                  type: integer
                  format: uint64
                resType:
                  type: string
                  enum: [file, folder]
                extractCode:
                  type: string
                maxVisit:
                  type: integer
                  default: -1
                expireHours:
                  type: integer
                  default: 72
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiskShare"
    get:
      summary: List user shares
      operationId: listShares
      tags: [Share]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DiskShare"
    delete:
      summary: Revoke share
      operationId: revokeShare
      tags: [Share]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shareId]
              properties:
                shareId:
                  type: integer
                  format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseBase"

  /v1/disk/share/{code}:
    get:
      summary: Get share info (public, no auth)
      operationId: getShare
      tags: [Share]
      security: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiskShare"

  /v1/disk/share/access:
    post:
      summary: Access shared resource (public, no auth)
      operationId: accessShare
      tags: [Share]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                extractCode:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiskShare"

  /v1/disk/preview/{id}:
    get:
      summary: Preview file content
      operationId: previewFile
      tags: [Preview]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: uint64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseBase"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PreviewResult"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ResponseBase:
      type: object
      properties:
        code:
          type: integer
          description: "0 means success"
        message:
          type: string

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ResponseBase"
        - type: object
          properties:
            data:
              type: object

    UserDisk:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        userId:
          type: string
        totalQuota:
          type: integer
          format: int64
          description: Total quota in bytes (default 10GB)
        usedQuota:
          type: integer
          format: int64
          description: Used quota in bytes
        rootFolder:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DiskFolder:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        userId:
          type: string
        parentId:
          type: integer
          format: uint64
        folderName:
          type: string
        fullPath:
          type: string
        sortOrder:
          type: integer
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DiskFile:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        userId:
          type: string
        folderId:
          type: integer
          format: uint64
        fileName:
          type: string
        fileSize:
          type: integer
          format: int64
        fileType:
          type: string
        ossKey:
          type: string
        md5:
          type: string
        version:
          type: integer
        isDeleted:
          type: boolean
        sourceAgent:
          type: string
        sourceAgentGroup:
          type: string
        isArtifact:
          type: boolean
          description: true if created by an agent
        tags:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DiskPermission:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        userId:
          type: string
        agentId:
          type: string
        resourceId:
          type: integer
          format: uint64
        resType:
          type: string
          enum: [file, folder]
        permission:
          type: string
          enum: [owner, read, write, delete]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DiskShare:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        userId:
          type: string
        resourceId:
          type: integer
          format: uint64
        resType:
          type: string
          enum: [file, folder]
        shareCode:
          type: string
        extractCode:
          type: string
        maxVisit:
          type: integer
          description: "-1 means unlimited"
        visitCount:
          type: integer
        expireAt:
          type: string
          format: date-time
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    DiskRecycleBin:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        userId:
          type: string
        resourceId:
          type: integer
          format: uint64
        resType:
          type: string
        resName:
          type: string
        originalPath:
          type: string
        deletedBy:
          type: string
        expireAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    DiskFileVersion:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        fileId:
          type: integer
          format: uint64
        userId:
          type: string
        version:
          type: integer
        ossKey:
          type: string
        fileSize:
          type: integer
          format: int64
        md5:
          type: string
        snapshotBy:
          type: string
        createdAt:
          type: string
          format: date-time

    DiskTag:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        userId:
          type: string
        tagName:
          type: string
        createdAt:
          type: string
          format: date-time

    PreviewResult:
      type: object
      properties:
        fileType:
          type: string
          description: "markdown, code, image, text, binary"
        url:
          type: string
          description: Presigned URL for file content

    DownloadTokenResponse:
      type: object
      properties:
        downloadToken:
          type: string
        expiresIn:
          type: integer
          description: Token validity in seconds

    FileDetailResponse:
      type: object
      properties:
        file:
          $ref: "#/components/schemas/DiskFile"
        url:
          type: string
          description: Presigned URL for file access

    DownloadByTokenResponse:
      type: object
      properties:
        file:
          $ref: "#/components/schemas/DiskFile"
        downloadUrl:
          type: string
          description: Presigned URL for file download

    PermissionCheckResponse:
      type: object
      properties:
        allowed:
          type: boolean
