server:
  port: 9100
  mode: release  # debug / release / test

database:
  driver: sqlite              # mysql (默认) 或 sqlite
  path: ~/.agentdisk/disk.db  # SQLite 文件路径 (仅 driver=sqlite 时生效)
  host: 172.20.6.37
  port: 3306
  name: agentdisk
  user: root
  # password: 通过环境变量 DB_PASSWORD 注入
  max_idle_conns: 10
  max_open_conns: 100
  log_level: warn  # silent / error / warn / info

oss:
  driver: local               # minio (默认) 或 local
  path: ~/.agentdisk/disk/    # 本地存储根路径 (仅 driver=local 时生效)
  endpoint: "172.20.6.37:9000"
  # access_key: 通过环境变量 OSS_ACCESS_KEY 注入
  # secret_key: 通过环境变量 OSS_SECRET_KEY 注入
  bucket: "agentdisk"
  use_ssl: false
  region: "default"

redis:
  enabled: false
  addr: "127.0.0.1:6379"
  # password: 通过环境变量 REDIS_PASSWORD 注入
  db: 0

jwt:
  secret: "dev-jwt-secret-for-testing-only"
  expire_hours: 72

log:
  level: info      # debug / info / warn / error
  output: stdout   # stdout / file
  file_path: logs/agentdisk.log

oauth2:
  enabled: true               # 启用 OAuth2 Web 登录
  client_id: "agentdisk"
  client_secret: "agentdisk-secret"
  auth_url: "http://localhost:3100/oauth2/authorize"
  token_url: "http://localhost:3100/oauth2/token"
  userinfo_url: "http://localhost:3100/oauth2/userinfo"
  redirect_url: "http://localhost:9100/auth/callback"
  frontend_url: "http://localhost:9101"
  scopes:
    - openid
    - profile

download_token:
  secret: "dev-dl-token-secret-for-testing"
  expire_seconds: 300         # 下载令牌有效期（秒）

webauthn:
  enabled: true
  rp_display_name: "AgentDisk Admin"
  rp_id: "localhost"
  rp_origins: "http://localhost:9101"
  timeout: 60000
