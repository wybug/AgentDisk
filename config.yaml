server:
  port: 8080
  mode: release  # debug / release / test

database:
  driver: mysql   # mysql / sqlite
  host: 172.20.6.37
  port: 3306
  name: agentdisk
  user: root
  # password: 通过环境变量 DB_PASSWORD 注入
  max_idle_conns: 10
  max_open_conns: 100
  log_level: warn  # silent / error / warn / info

oss:
  endpoint: "172.20.6.37:9000"
  # access_key: 通过环境变量 OSS_ACCESS_KEY 注入
  # secret_key: 通过环境变量 OSS_SECRET_KEY 注入
  bucket: "agentdisk"
  use_ssl: false
  region: "default"

redis:
  enabled: false
  addr: "127.0.0.1:6379"
  # password: 通过环境变量 REDIS_PASSWORD 注入
  db: 0

jwt:
  # secret: 通过环境变量 JWT_SECRET 注入
  expire_hours: 72

log:
  level: info      # debug / info / warn / error
  output: stdout   # stdout / file
  file_path: logs/agentdisk.log

oauth2:
  enabled: false              # 启用 OAuth2 Web 登录
  # client_id: 通过环境变量 OAUTH2_CLIENT_ID 注入
  # client_secret: 通过环境变量 OAUTH2_CLIENT_SECRET 注入
  auth_url: ""                # 网关授权端点, 例: https://gateway.example.com/oauth2/authorize
  token_url: ""               # 网关令牌端点, 例: https://gateway.example.com/oauth2/token
  userinfo_url: ""            # 网关用户信息端点, 例: https://gateway.example.com/oauth2/userinfo
  redirect_url: ""            # AgentDisk 回调地址, 例: https://disk.example.com/auth/callback
  scopes:
    - openid
    - profile

download_token:
  # secret: 通过环境变量 DL_TOKEN_SECRET 注入
  expire_seconds: 300         # 下载令牌有效期（秒）
