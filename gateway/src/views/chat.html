<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 对话</title>
  <link rel="stylesheet" href="/static/chat-styles.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .chat-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .chat-header a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      opacity: 0.85;
    }
    .chat-header a:hover { opacity: 1; }
    .chat-header h1 { font-size: 18px; font-weight: 600; }
    #chat-root {
      height: calc(100vh - 52px);
      display: flex;
      flex-direction: column;
    }
    .markdown-body p { margin: 0.2em 0; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin: 0.2em 0; }
    .markdown-body code { background: #f1f3f5; padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }
    .markdown-body pre { background: #1e1e2e; color: #cdd6f4; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 0.3em 0; }
    .markdown-body pre code { background: none; padding: 0; color: inherit; }
    .markdown-body blockquote { border-left: 3px solid #ddd; margin: 0.3em 0; padding-left: 12px; color: #888; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin: 0.3em 0 0.15em; }
    .markdown-body a { color: #667eea; }
    .markdown-body table { border-collapse: collapse; margin: 0.3em 0; }
    .markdown-body th, .markdown-body td { border: 1px solid #e5e7eb; padding: 6px 10px; }
    .markdown-body hr { border: none; border-top: 1px solid #e5e7eb; margin: 0.5em 0; }
  </style>
</head>
<body>
  <div class="chat-header">
    <a href="/dashboard">&larr; 返回仪表盘</a>
    <h1>Agent 对话</h1>
  </div>
  <div id="chat-root"></div>
  <script src="/static/chat-bundle.js"></script>
</body>
</html>
